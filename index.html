<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Docentes</title>
</head>

<body>

  <h1>Gestión de Docentes</h1>

  <!-- ===== FORMULARIO ===== -->
  <h2>Agregar Docente</h2>

  
  <label>Tipo de Documento:</label>
  <select id="tipoDocumento">
    <option value="">-- Selecciona --</option>
    <option value="CC">C.C</option>
    <option value="CE">C.E</option>
    <option value="TI">TI</option>
    <option value="NIUP">NIUP</option>
  </select>
  <br><br>

  
  <label>Nombre:</label>
  <input type="text" id="nombre" placeholder="Ej: María">
  <br><br>

  
  <label>Apellido:</label>
  <input type="text" id="apellido" placeholder="Ej: González">
  <br><br>

 
  <label>Fecha de Nacimiento:</label>
  <input type="date" id="fechaNacimiento">
  <br><br>

  
  <label>Nivel de Estudios:</label>
  <select id="nivelEstudios">
    <option value="">-- Selecciona --</option>
    <option value="Pregrado">Pregrado</option>
    <option value="Maestría">Maestría</option>
    <option value="Doctorado">Doctorado</option>
  </select>
  <br><br>

 
  <label>Área:</label>
  <select id="area">
    <option value="">-- Selecciona --</option>
    <option value="Matemáticas">Matemáticas</option>
    <option value="Ciencias">Ciencias</option>
    <option value="Sistemas">Sistemas</option>
  </select>
  <br><br>

  
  <label>Grado:</label>
  <select id="grado">
    <option value="">-- Selecciona --</option>
    <option value="Primer Semestre">Primer Semestre</option>
    <option value="Segundo Semestre">Segundo Semestre</option>
    <option value="Tercer Semestre">Tercer Semestre</option>
    <option value="Cuarto Semestre">Cuarto Semestre</option>
  </select>
  <br><br>

  
  <label>EPS:</label>
  <input type="text" id="eps" placeholder="Ej: Sura">
  <br><br>

  
  <label>Salario:</label>
  <input type="number" id="salario" placeholder="Ej: 2500000">
  <br><br>

  
  <button>Guardar Docente</button>

</body>
</html>
