<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Docentes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="page-header">
      <h1>Gestión de Docentes</h1>
      <p class="subtitle">Hecho por Mariana Viggiani Torres 4to Semestre</p>
    </header>

  
    <section class="form-card">
      <h2>Agregar Docente</h2>

      <div class="form-grid">

        <div class="form-group">
          <label for="tipoDocumento">Tipo de Documento</label>
          <select id="tipoDocumento">
            <option value="">-- Selecciona --</option>
            <option value="CC">C.C</option>
            <option value="CE">C.E</option>
            <option value="TI">TI</option>
            <option value="NIUP">NIUP</option>
          </select>
        </div>

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ej: María">
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Ej: González">
        </div>

        <div class="form-group">
          <label for="fechaNacimiento">Fecha de Nacimiento</label>
          <input type="date" id="fechaNacimiento">
        </div>

        <div class="form-group">
          <label for="nivelEstudios">Nivel de Estudios</label>
          <select id="nivelEstudios">
            <option value="">-- Selecciona --</option>
            <option value="Pregrado">Pregrado</option>
            <option value="Maestría">Maestría</option>
            <option value="Doctorado">Doctorado</option>
          </select>
        </div>

        <div class="form-group">
          <label for="area">Área</label>
          <select id="area">
            <option value="">-- Selecciona --</option>
            <option value="Matemáticas">Matemáticas</option>
            <option value="Ciencias">Ciencias</option>
            <option value="Sistemas">Sistemas</option>
          </select>
        </div>

        <div class="form-group">
          <label for="grado">Grado</label>
          <select id="grado">
            <option value="">-- Selecciona --</option>
            <option value="Primer Semestre">Primer Semestre</option>
            <option value="Segundo Semestre">Segundo Semestre</option>
            <option value="Tercer Semestre">Tercer Semestre</option>
            <option value="Cuarto Semestre">Cuarto Semestre</option>
          </select>
        </div>

        <div class="form-group">
          <label for="eps">EPS</label>
          <input type="text" id="eps" placeholder="Ej: Sura">
        </div>

        <div class="form-group">
          <label for="salario">Salario</label>
          <input type="number" id="salario" placeholder="Ej: 2500000">
        </div>

      </div>

      <div class="form-actions">
        <button id="btnGuardar" class="btn btn-primary">Guardar Docente</button>
        <button id="btnCancelar" class="btn btn-secondary" style="display:none;">Cancelar Edición</button>
      </div>

    </section>

    <!--Tablaa-->
    <section class="table-card">
      <h2>Docentes Registrados</h2>
      <div class="table-wrapper">
        <table id="tablaDocentes">
          <thead>
            <tr>
              <th>#</th>
              <th>Tipo Doc.</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>F. Nacimiento</th>
              <th>Nivel</th>
              <th>Área</th>
              <th>Grado</th>
              <th>EPS</th>
              <th>Salario</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla">
           
          </tbody>
        </table>
        <p id="mensajeVacio" class="empty-message">No hay docentes registrados aún.</p>
      </div>
    </section>

  </div>

 
  <script src="script.js"></script>
</body>
</html>
